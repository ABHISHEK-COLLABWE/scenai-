<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SceneAI — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080b10;color:#eef2ff;font-family:'Outfit',system-ui,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
  .icon{font-size:64px;margin-bottom:24px;opacity:.6}
  h1{font-size:28px;font-weight:700;margin-bottom:10px}
  p{font-size:15px;color:#8896b0;line-height:1.7;max-width:420px;margin-bottom:28px}
  button{padding:13px 28px;border:none;border-radius:12px;background:#f97316;color:#fff;
    font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
  button:hover{opacity:.85}
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>SceneAI needs to connect to the local processing server.<br>Make sure <code>sceneai_server.py</code> is running and try again.</p>
  <button onclick="location.reload()">↺ Retry Connection</button>
</body>
</html>
